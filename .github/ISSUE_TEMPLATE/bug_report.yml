name: Bug Report
description: Something is broken or behaving unexpectedly
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug in PatronAI.
        Please fill in as much detail as you can — it helps us fix things faster.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I click X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact steps that reliably trigger the bug.
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Scanner / agent
        - Dashboard UI
        - Reports / PDF export
        - Alerts / webhooks
        - MCP server
        - Docker / deployment
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: PatronAI version
      placeholder: "e.g. v1.1.0 or git SHA"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      description: Paste any error output here (redact sensitive data).
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am not reporting a security vulnerability (use security@giggso.com instead)
          required: true
