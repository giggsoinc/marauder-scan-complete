# =============================================================
# FILE: docker-compose.yml
# VERSION: 1.2.0
# UPDATED: 2026-05-02
# OWNER: Giggso Inc
# PURPOSE: Production docker-compose for single EC2 deployment.
#          Three containers: scanner, grafana, nginx.
#          Reads all config from .env generated by setup.sh.
# USAGE: bash scripts/start.sh   (preferred — handles env hygiene)
#    OR: docker compose up -d
# REQUIRES: .env file generated by scripts/setup.sh
# AUDIT LOG:
#   v1.0.0  2026-04-19  Initial.
#   v1.1.0  2026-04-29  Chat data backend env vars + Grafana password
#                       fail-loud + chat retention.
#   v1.2.0  2026-05-02  Stop interpolating AWS_ACCESS_KEY_ID /
#                       AWS_SECRET_ACCESS_KEY / AWS_REGION via ${VAR}
#                       in `environment:`. Compose was substituting
#                       from the SHELL environment of the user running
#                       `docker compose up`; if that shell had ever
#                       sourced an older .env (`set -a; source .env`),
#                       the exported value SHADOWED the freshly-edited
#                       on-disk .env, and the container started with
#                       stale credentials. Fix: rely solely on
#                       `env_file: .env` for AWS_* vars (always reads
#                       disk at container start, no shell shadowing).
#                       See scripts/start.sh for a safe wrapper.
# =============================================================

services:

  # ── Scanner + Streamlit ─────────────────────────────────────
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: patronai
    restart: unless-stopped
    env_file: .env
    environment:
      # ── DO NOT interpolate AWS_* here ──────────────────────────────
      # `env_file: .env` injects AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
      # / AWS_REGION directly into the container at start, ALWAYS reading
      # fresh from disk. If we instead listed them as `${VAR}` here,
      # docker-compose would substitute from the SHELL environment of
      # the user running `docker compose up` — which can be stale (e.g.
      # left over from a previous `set -a; source .env`). That stale
      # value would shadow the on-disk value and silently use old creds.
      # See the bug write-up in the v1.2.0 audit log entry below.
      #
      # PATRONAI_BUCKET is preferred; MARAUDER_SCAN_BUCKET accepted as legacy alias.
      - MARAUDER_SCAN_BUCKET=${PATRONAI_BUCKET:-${MARAUDER_SCAN_BUCKET:-}}
      - COMPANY_NAME=${COMPANY_NAME}
      - COMPANY_SLUG=${COMPANY_SLUG}
      - ALLOWED_EMAILS=${ALLOWED_EMAILS}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      # SUPPORT_EMAILS — comma-separated; sees Support view + Manager + Exec
      - SUPPORT_EMAILS=${SUPPORT_EMAILS:-}
      - ALERT_SNS_ARN=${ALERT_SNS_ARN}
      - TRINITY_WEBHOOK_URL=${TRINITY_WEBHOOK_URL}
      - LOGANALYZER_WEBHOOK_URL=${LOGANALYZER_WEBHOOK_URL}
      # SES alert email settings
      - ALERT_RECIPIENTS=${ALERT_RECIPIENTS:-}
      - PATRONAI_FROM_EMAIL=${PATRONAI_FROM_EMAIL:-noreply@patronai.ai}
      - SCAN_INTERVAL_SECS=${SCAN_INTERVAL_SECS:-300}
      - DEDUP_WINDOW_MINUTES=${DEDUP_WINDOW_MINUTES:-60}
      - CROWDSTRIKE_ENABLED=${CROWDSTRIKE_ENABLED:-false}
      - CLOUD_PROVIDER=${CLOUD_PROVIDER:-aws}
      - STREAMLIT_PORT=8501
      # PUBLIC_HOST = EC2 public IP or DNS, e.g. 3.91.73.197
      # GRAFANA_URL = full Grafana base URL, e.g. http://3.91.73.197/grafana
      # If GRAFANA_URL is set it takes precedence over PUBLIC_HOST
      - PUBLIC_HOST=${PUBLIC_HOST:-}
      - GRAFANA_URL=${GRAFANA_URL:-}
      # LLM chat — llama-server runs inside the container on :8080
      - LLM_PROVIDER=${LLM_PROVIDER:-openai_compat}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://localhost:8080}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL_REPO=${LLM_MODEL_REPO:-LiquidAI/LFM2.5-1.2B-Thinking-GGUF}
      # ── Chat data backend (S3 hourly rollups) ────────────────
      # Hourly rollup job aggregates findings/.../jsonl into per-user
      # and per-tenant dimension files for the chat tools to query.
      - ROLLUP_HOURLY_OFFSET_MINUTES=${ROLLUP_HOURLY_OFFSET_MINUTES:-5}
      # First-deploy backfill: when no rollups exist yet, process the last
      # N days so chat has historical data to answer over from the start.
      - ROLLUP_INITIAL_BACKFILL_DAYS=${ROLLUP_INITIAL_BACKFILL_DAYS:-7}
      # LLM read timeout (seconds) — LFM2.5-Thinking emits long reasoning
      # before tool calls, so 60s isn't enough for tool-call loops.
      - LLM_READ_TIMEOUT_S=${LLM_READ_TIMEOUT_S:-180}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-1024}
      # Chat conversation S3 retention (auto-expires keys under chat/).
      - CHAT_HISTORY_RETENTION_DAYS=${CHAT_HISTORY_RETENTION_DAYS:-30}
      # Docs RAG auto-refresh: how often to check for changed doc files.
      # 0 / very low values clamp to 60s; default 5 min is plenty since
      # docs change at most once per deploy.
      - DOCS_REFRESH_INTERVAL_S=${DOCS_REFRESH_INTERVAL_S:-300}
    volumes:
      - patronai-models:/models
    ports:
      - "8501:8501"
    networks:
      - marauder-scan
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ── Grafana ─────────────────────────────────────────────────
  grafana:
    build:
      context: .
      dockerfile: Dockerfile.grafana
    container_name: marauder-scan-grafana
    restart: unless-stopped
    env_file: .env
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      # Fail-loud if missing: this expansion exits the compose stack startup
      # with an explicit error rather than booting Grafana with a known
      # default password. Set GF_SECURITY_ADMIN_PASSWORD in .env (generated
      # by scripts/setup.sh).
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set in .env}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_USERS_DEFAULT_THEME=light
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    ports:
      - "3000:3000"
    networks:
      - marauder-scan
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Nginx reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: marauder-scan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - marauder-scan
    depends_on:
      - scanner
      - grafana
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  marauder-scan:
    driver: bridge

volumes:
  grafana-data:
    driver: local
  patronai-models:
    driver: local
