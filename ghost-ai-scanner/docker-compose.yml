# =============================================================
# FILE: docker-compose.yml
# VERSION: 1.1.0
# UPDATED: 2026-04-29
# OWNER: Giggso Inc
# PURPOSE: Production docker-compose for single EC2 deployment.
#          Three containers: scanner, grafana, nginx.
#          Reads all config from .env generated by setup.sh.
# USAGE: docker-compose up -d
# REQUIRES: .env file generated by scripts/setup.sh
# =============================================================

services:

  # ── Scanner + Streamlit ─────────────────────────────────────
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marauder-scan
    restart: unless-stopped
    env_file: .env
    environment:
      - MARAUDER_SCAN_BUCKET=${MARAUDER_SCAN_BUCKET}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - COMPANY_NAME=${COMPANY_NAME}
      - COMPANY_SLUG=${COMPANY_SLUG}
      - ALLOWED_EMAILS=${ALLOWED_EMAILS}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      # SUPPORT_EMAILS — comma-separated; sees Support view + Manager + Exec
      - SUPPORT_EMAILS=${SUPPORT_EMAILS:-}
      - ALERT_SNS_ARN=${ALERT_SNS_ARN}
      - TRINITY_WEBHOOK_URL=${TRINITY_WEBHOOK_URL}
      - LOGANALYZER_WEBHOOK_URL=${LOGANALYZER_WEBHOOK_URL}
      # SES alert email settings
      - ALERT_RECIPIENTS=${ALERT_RECIPIENTS:-}
      - PATRONAI_FROM_EMAIL=${PATRONAI_FROM_EMAIL:-noreply@patronai.ai}
      - SCAN_INTERVAL_SECS=${SCAN_INTERVAL_SECS:-300}
      - DEDUP_WINDOW_MINUTES=${DEDUP_WINDOW_MINUTES:-60}
      - CROWDSTRIKE_ENABLED=${CROWDSTRIKE_ENABLED:-false}
      - CLOUD_PROVIDER=${CLOUD_PROVIDER:-aws}
      - STREAMLIT_PORT=8501
      # PUBLIC_HOST = EC2 public IP or DNS, e.g. 3.91.73.197
      # GRAFANA_URL = full Grafana base URL, e.g. http://3.91.73.197/grafana
      # If GRAFANA_URL is set it takes precedence over PUBLIC_HOST
      - PUBLIC_HOST=${PUBLIC_HOST:-}
      - GRAFANA_URL=${GRAFANA_URL:-}
      # LLM chat — llama-server runs inside the container on :8080
      - LLM_PROVIDER=${LLM_PROVIDER:-openai_compat}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://localhost:8080}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL_REPO=${LLM_MODEL_REPO:-unsloth/Qwen3-0.6B-GGUF}
      - LLM_MODEL_FILE=${LLM_MODEL_FILE:-Qwen3-0.6B-Q4_K_M.gguf}
    volumes:
      - patronai-models:/models
    ports:
      - "8501:8501"
    networks:
      - marauder-scan
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ── Grafana ─────────────────────────────────────────────────
  grafana:
    build:
      context: .
      dockerfile: Dockerfile.grafana
    container_name: marauder-scan-grafana
    restart: unless-stopped
    env_file: .env
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-change-me}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_USERS_DEFAULT_THEME=light
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    ports:
      - "3000:3000"
    networks:
      - marauder-scan
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Nginx reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: marauder-scan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - marauder-scan
    depends_on:
      - scanner
      - grafana
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  marauder-scan:
    driver: bridge

volumes:
  grafana-data:
    driver: local
  patronai-models:
    driver: local
