# =============================================================
# FILE: nginx/nginx.conf
# VERSION: 1.1.0
# UPDATED: 2026-04-19
# OWNER: Giggso Inc
# PURPOSE: Nginx reverse proxy for PatronAI.
#          Routes /grafana/ to Grafana :3000 — strips prefix via proxy_pass
#          trailing slash, tells Grafana its subpath via X-Forwarded-Prefix.
#          Routes / (default) to Streamlit :8501.
# AUDIT LOG:
#   v1.0.0  2026-04-18  Initial
#   v1.1.0  2026-04-19  X-Forwarded-Prefix on /grafana/; default → Streamlit
# =============================================================

events {
    worker_connections 256;
}

http {
    upstream grafana {
        server grafana:3000;
    }

    upstream streamlit {
        server scanner:8501;
    }

    server {
        listen 80;
        server_name _;

        # Default — Grafana dashboard
        location / {
            proxy_pass         http://grafana;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # Grafana subpath — trailing slash on proxy_pass strips /grafana prefix
        location /grafana/ {
            proxy_pass         http://grafana/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Prefix /grafana;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # Streamlit settings UI
        location /settings {
            proxy_pass         http://streamlit;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # Streamlit websocket
        location /settings/_stcore/stream {
            proxy_pass         http://streamlit/_stcore/stream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
